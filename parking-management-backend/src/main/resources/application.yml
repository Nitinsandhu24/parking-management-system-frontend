spring:
  application:
    name: parking-management-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/parking_master
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:98123145}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: master

  flyway:
    enabled: true
    schemas: master
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:nitinsandhu157@gmail.com}
    password: ${MAIL_PASS:emwu ugok nhwv gerx}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: 8080
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-please}
    expiration-ms: 86400000       # 24 hours
    refresh-expiration-ms: 604800000  # 7 days

  cors:
    allowed-origins: "${FRONTEND_URL:http://localhost:3000},http://localhost:3000"

logging:
  level:
    com.parking: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: "*"
